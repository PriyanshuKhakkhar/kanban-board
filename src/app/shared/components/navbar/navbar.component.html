<div class="topbar-search-section">
  <div class="logo-area">
    <img
      *ngIf="useImageLogo"
      src="assets/kanban-logo.png"
      alt="Kanban logo"
      class="app-logo-img"
      (error)="onLogoError()"
    />

    <ng-container *ngIf="!useImageLogo">
      <!-- Inline SVG mark fallback -->
      <svg
        class="app-logo-mark"
        viewBox="0 0 40 40"
        preserveAspectRatio="xMidYMid meet"
        xmlns="http://www.w3.org/2000/svg"
        role="img"
        aria-label="Kanban mark"
      >
        <defs>
          <linearGradient id="g" x1="0" x2="1">
            <stop offset="0" stop-color="#4f46e5" />
            <stop offset="1" stop-color="#06b6d4" />
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="28" height="28" rx="6" fill="url(#g)" />
      </svg>

      <div class="brand">
        <span class="brand-main">Kanban</span>
        <span class="brand-accent">Board</span>
      </div>
    </ng-container>
  </div>

  <div class="search-group">
    <div class="trello-search-box">
      <mat-icon class="search-icon" aria-hidden="true">search</mat-icon>
      <input
        class="trello-search-input"
        type="search"
        placeholder="Search"
        aria-label="Search"
      />
    </div>

    <button
      *ngIf="canManageBoards"
      mat-flat-button
      class="trello-create-btn"
      (click)="openCreateDialog()"
    >
      Create
    </button>
  </div>

  <div class="nav-actions">
    <!-- ── Theme picker ──────────────────────────────────────── -->
    <app-theme-switcher></app-theme-switcher>

    <!-- ── Notifications ────────────────────────────────────── -->
    <button
      mat-icon-button
      class="notif-btn"
      [matMenuTriggerFor]="notifMenu"
      aria-label="Notifications"
    >
      <mat-icon>notifications_none</mat-icon>
      <span class="notif-badge" *ngIf="notificationsCount > 0">{{
        notificationsCount
      }}</span>
    </button>

    <!-- ── Profile Avatar ────────────────────────────────────── -->
    <button
      mat-button
      class="profile-btn"
      [matMenuTriggerFor]="profileMenu"
      aria-label="Profile"
    >
      <div class="profile-avatar">{{ userInitials }}</div>

      <!-- Hover Tooltip -->
      <div class="profile-tooltip" *ngIf="currentUser">
        <div class="tooltip-name">{{ currentUser.fullName }}</div>
        <div class="tooltip-email">{{ currentUser.email }}</div>
        <div class="tooltip-role">Role: {{ currentUser.role }}</div>
      </div>
    </button>

    <mat-menu #notifMenu="matMenu">
      <div class="notif-list">
        <div class="notif-item">No new notifications</div>
      </div>
    </mat-menu>

    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item>My Profile</button>
      <button mat-menu-item>Settings</button>
      <mat-divider></mat-divider>
      <button mat-menu-item (click)="onLogout()">Logout</button>
    </mat-menu>
  </div>
</div>
