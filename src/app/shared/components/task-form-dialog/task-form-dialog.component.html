<div class="kb-backdrop" (click)="cancel()"></div>

<div class="kb-modal" role="dialog" [attr.aria-label]="title">
  <!-- Header -->
  <div class="kb-modal-header">
    <span class="kb-modal-title">{{ title }}</span>
    <button class="kb-close-btn" (click)="cancel()" aria-label="Close dialog">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="close-icon">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="kb-modal-form">
    <!-- Body -->
    <div class="kb-modal-body">
      <!-- Task Title -->
      <div class="form-group">
        <label class="kb-label" for="task-title">Task Title</label>
        <input
          id="task-title"
          class="kb-input"
          type="text"
          formControlName="title"
          placeholder="Enter task title"
          autofocus
        />
        <div class="error-msg" *ngIf="form.get('title')?.touched && form.get('title')?.errors?.['required']">
          Title is required
        </div>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="kb-label" for="task-description">Description</label>
        <textarea
          id="task-description"
          class="kb-input"
          formControlName="description"
          placeholder="Enter task description"
          rows="3"
          style="resize: vertical; min-height: 80px;"
        ></textarea>
        <div class="error-msg" *ngIf="form.get('description')?.touched && form.get('description')?.errors?.['required']">
          Description is required.
        </div>
        <div class="error-msg" *ngIf="form.get('description')?.touched && (form.get('description')?.errors?.['minlength'] || form.get('description')?.errors?.['maxlength'])">
          Description must be between 10 and 500 characters.
        </div>
      </div>

      <!-- Priority -->
      <div class="form-group">
        <label class="kb-label" for="task-priority">Priority</label>
        <select id="task-priority" class="kb-input kb-select" formControlName="priority">
          <option value="" disabled selected>Select priority</option>
          <option value="HIGH">High Priority</option>
          <option value="MEDIUM">Medium Priority</option>
          <option value="LOW">Low Priority</option>
        </select>
        <div class="error-msg" *ngIf="form.get('priority')?.touched && form.get('priority')?.errors?.['required']">
          Priority is required
        </div>
      </div>

      <!-- Assignee -->
      <div class="form-group relative-container">
        <label class="kb-label" for="task-assignee">Assignee</label>
        <div class="search-select-container">
          <input
            id="task-assignee"
            class="kb-input kb-select-search"
            type="text"
            formControlName="_assigneeSearch"
            placeholder="Select assignee"
            (focus)="onAssigneeFocus()"
            (input)="onAssigneeInput($event)"
            (blur)="onAssigneeBlur()"
            autocomplete="off"
          />
          <div class="dropdown-list" *ngIf="isDropdownOpen">
            <ng-container *ngIf="filteredUsers.length > 0; else noUsers">
              <div
                *ngFor="let user of filteredUsers"
                class="dropdown-item"
                (mousedown)="selectAssignee(user)"
              >
                {{ user.fullName }}
              </div>
            </ng-container>
            <ng-template #noUsers>
              <div class="dropdown-item empty">No users found</div>
            </ng-template>
          </div>
        </div>
        <div class="error-msg" *ngIf="form.get('assigneeId')?.touched && form.get('assigneeId')?.errors?.['required']">
          Assignee is required
        </div>
      </div>

      <!-- Due Date -->
      <div class="form-group">
        <label class="kb-label" for="task-due-date">Due Date</label>
        <input
          id="task-due-date"
          class="kb-input"
          type="date"
          formControlName="dueDate"
        />
        <div class="error-msg" *ngIf="form.get('dueDate')?.touched && form.get('dueDate')?.errors?.['required']">
          Due Date is required
        </div>
      </div>

      <!-- Is Complete -->
      <div class="form-group" *ngIf="isTaskInProgress">
        <label class="kb-label">Is Complete?</label>
        <div class="radio-group">
          <label class="radio-label">
            <input
              type="radio"
              [value]="true"
              formControlName="isComplete"
              class="kb-radio"
            />
            <span class="radio-text">Yes</span>
          </label>
          <label class="radio-label">
            <input
              type="radio"
              [value]="false"
              formControlName="isComplete"
              class="kb-radio"
            />
            <span class="radio-text">No</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="kb-modal-footer">
      <button type="button" class="kb-btn kb-btn-cancel" (click)="cancel()">Cancel</button>
      <button type="submit" class="kb-btn kb-btn-save" [disabled]="form.invalid">{{ submitLabel }}</button>
    </div>
  </form>
</div>
