<app-navbar></app-navbar>

<div class="dashboard-layout">
  <aside class="sidebar">Sidebar</aside>

  <main class="dashboard-main">
    <header class="topbar">Kanban Board</header>

    <!-- Board container: 4 responsive columns -->
    <section class="board-wrapper">
      <div class="board-container">
        <!-- To Do -->
        <div class="board-column col-todo">
          <div class="column-header">
            <div class="title-row">
              <h3>To Do</h3>
              <span class="count">{{ todoTasks.length }}</span>
            </div>
            <button class="add-card" (click)="toggleAdd('todo')">
              + Add card
            </button>
          </div>

          <div *ngIf="showAddInput.todo" class="add-input">
            <input
              #todoInput
              type="text"
              placeholder="Enter task title"
              (keyup.enter)="
                createTask('todo', todoInput.value); todoInput.value = ''
              "
            />
            <div class="add-actions">
              <button
                class="primary"
                (click)="
                  createTask('todo', todoInput.value); todoInput.value = ''
                "
              >
                Add
              </button>
              <button class="muted" (click)="toggleAdd('todo')">Cancel</button>
            </div>
          </div>

          <div *ngFor="let task of todoTasks" class="card">
            <div class="card-title">{{ task.title }}</div>
          </div>
        </div>

        <!-- In Progress -->
        <div class="board-column col-inprogress">
          <div class="column-header">
            <div class="title-row">
              <h3>In Progress</h3>
              <span class="count">{{ inprogressTasks.length }}</span>
            </div>
            <button class="add-card" (click)="toggleAdd('inprogress')">
              + Add card
            </button>
          </div>

          <div *ngIf="showAddInput.inprogress" class="add-input">
            <input
              #inprogInput
              type="text"
              placeholder="Enter task title"
              (keyup.enter)="
                createTask('inprogress', inprogInput.value);
                inprogInput.value = ''
              "
            />
            <div class="add-actions">
              <button
                class="primary"
                (click)="
                  createTask('inprogress', inprogInput.value);
                  inprogInput.value = ''
                "
              >
                Add
              </button>
              <button class="muted" (click)="toggleAdd('inprogress')">
                Cancel
              </button>
            </div>
          </div>

          <div *ngFor="let task of inprogressTasks" class="card">
            <div class="card-title">{{ task.title }}</div>
          </div>
        </div>

        <!-- Review -->
        <div class="board-column col-review">
          <div class="column-header">
            <div class="title-row">
              <h3>Review</h3>
              <span class="count">{{ reviewTasks.length }}</span>
            </div>
            <button class="add-card" (click)="toggleAdd('review')">
              + Add card
            </button>
          </div>

          <div *ngIf="showAddInput.review" class="add-input">
            <input
              #reviewInput
              type="text"
              placeholder="Enter task title"
              (keyup.enter)="
                createTask('review', reviewInput.value); reviewInput.value = ''
              "
            />
            <div class="add-actions">
              <button
                class="primary"
                (click)="
                  createTask('review', reviewInput.value);
                  reviewInput.value = ''
                "
              >
                Add
              </button>
              <button class="muted" (click)="toggleAdd('review')">
                Cancel
              </button>
            </div>
          </div>

          <div *ngFor="let task of reviewTasks" class="card">
            <div class="card-title">{{ task.title }}</div>
          </div>
        </div>

        <!-- Done -->
        <div class="board-column col-done">
          <div class="column-header">
            <div class="title-row">
              <h3>Done</h3>
              <span class="count">{{ doneTasks.length }}</span>
            </div>
            <button class="add-card" (click)="toggleAdd('done')">
              + Add card
            </button>
          </div>

          <div *ngIf="showAddInput.done" class="add-input">
            <input
              #doneInput
              type="text"
              placeholder="Enter task title"
              (keyup.enter)="
                createTask('done', doneInput.value); doneInput.value = ''
              "
            />
            <div class="add-actions">
              <button
                class="primary"
                (click)="
                  createTask('done', doneInput.value); doneInput.value = ''
                "
              >
                Add
              </button>
              <button class="muted" (click)="toggleAdd('done')">Cancel</button>
            </div>
          </div>

          <div *ngFor="let task of doneTasks" class="card">
            <div class="card-title">{{ task.title }}</div>
          </div>
        </div>
      </div>
    </section>
  </main>
</div>
