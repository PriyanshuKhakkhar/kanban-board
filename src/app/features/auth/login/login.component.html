<div class="auth-page">
  <!-- LEFT ILLUSTRATION -->
  <div class="auth-illustration left-illustration">
    <img src="/444953-PFEO9T-107.jpg" alt="Planning Illustration" />
  </div>

  <!-- CENTER LOGIN -->
  <div class="auth-center">
    <mat-card class="login-card">
      <div class="card-header">
        <div class="logo-mark">KB</div>
        <h2 class="card-title login-title">Log in to continue</h2>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width form-group">
          <mat-label>Username or email</mat-label>
          <input
            matInput
            type="text"
            formControlName="usernameOrEmail"
            autocomplete="username"
          />
          <mat-error
            *ngIf="
              loginForm.get('usernameOrEmail')?.hasError('required') &&
              loginForm.get('usernameOrEmail')?.touched
            "
            >Username or email is required</mat-error
          >
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width form-group password-field">
          <mat-label>Password</mat-label>
          <input
            matInput
            type="password"
            formControlName="password"
            autocomplete="current-password"
          />
          <mat-error
            *ngIf="
              loginForm.get('password')?.hasError('required') &&
              loginForm.get('password')?.touched
            "
            >Password is required</mat-error
          >
        </mat-form-field>

        <div class="remember-row">
          <div class="remember-left">
            <mat-checkbox formControlName="remember">Remember me</mat-checkbox>
          </div>
          <a class="forgot" href="#">Forgot password?</a>
        </div>

        <button
          mat-raised-button
          color="primary"
          class="primary-btn"
          type="submit"
        >
          Log in
        </button>

        <div class="divider-text"><span>Or continue with</span></div>

        <div class="social-grid">
          <button type="button" class="social-btn google">
            <!-- Google SVG -->
            <svg
              width="18"
              height="18"
              viewBox="0 0 18 18"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M17.64 9.20455C17.64 8.56636 17.58 7.96182 17.46 7.38636H9V10.8164H13.84C13.68 11.8864 12.92 12.7864 11.76 13.3864V15.5864H14.9C16.84 14.1064 17.64 11.9064 17.64 9.20455Z"
                fill="#4285F4"
              />
              <path
                d="M9 18C11.43 18 13.44 17.12 14.9 15.5864L11.76 13.3864C11.06 13.8264 10.12 14.0664 9 14.0664C6.62 14.0664 4.66 12.2564 4.06 9.96636H0.86V12.2164C2.3 15.8464 5.36 18 9 18Z"
                fill="#34A853"
              />
              <path
                d="M4.06 9.96636C3.88 9.38636 3.76 8.76636 3.76 8.11636C3.76 7.46636 3.88 6.84636 4.06 6.26636V4.01636H0.86C0.26 5.58636 0 7.29636 0 8.99636C0 10.6964 0.26 12.4064 0.86 13.9764L4.06 11.7264V9.96636Z"
                fill="#FBBC05"
              />
              <path
                d="M9 3.93636C10.38 3.93636 11.58 4.54636 12.44 5.49636L15.02 2.91636C13.44 1.44636 11.43 0.6 9 0.6C5.36 0.6 2.3 2.73636 0.86 6.36636L4.06 8.61636C4.66 6.32636 6.62 4.51636 9 4.51636V3.93636Z"
                fill="#EA4335"
              />
            </svg>
            <span>Continue with Google</span>
          </button>
        </div>

        <div class="footer-row create-account">
          <a href="#" class="create">Create account</a>
        </div>
      </form>
    </mat-card>
  </div>

  <!-- RIGHT ILLUSTRATION -->
  <div class="auth-illustration right-illustration">
    <img src="/4882442.jpg" alt="Team Collaboration" />
  </div>
</div>
