<div class="register-wrapper">

  <div class="auth-illustration left-illustration">
    <img src="/444953-PFEO9T-107.jpg" alt="Planning Illustration" />
  </div>

  <div class="auth-illustration right-illustration">
    <img src="/4882442.jpg" alt="Team Collaboration" />
  </div>

  <div class="register-card">

    <h1>Create Your Account</h1>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div *ngIf="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched" class="error-message">
          Full name is required.
        </div>

        <div class="input-field" [class.invalid]="registerForm.get('fullName')?.invalid && registerForm.get('fullName')?.touched">
          <span class="icon">👤</span>

          <input
            type="text"
            placeholder="John Doe"
            formControlName="fullName"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Email Address</label>

        <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="error-message">
          <div *ngIf="registerForm.get('email')?.errors?.['required']">Email is required.</div>
          <div *ngIf="registerForm.get('email')?.errors?.['email']">Enter a valid email.</div>
        </div>

        <div class="input-field" [class.invalid]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          <span class="icon">✉️</span>

          <input
            type="email"
            placeholder="you@example.com"
            formControlName="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>

        <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="error-message">
          <div *ngIf="registerForm.get('password')?.errors?.['required']">Password is required.</div>
          <div *ngIf="registerForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</div>
        </div>

        <div class="input-field" [class.invalid]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          <span class="icon">🔒</span>

          <input
            type="password"
            placeholder="••••••••"
            formControlName="password"
          />
        </div>
      </div>

      <button type="submit">
        Submit
      </button>

    </form>

    <p class="terms">
      By continuing, you agree to our
      <span>Terms of Service</span>
      and
      <span>Privacy Policy.</span>
    </p>

  </div>

</div>
